services:
  backend:
    build:
      context: ./backend
      args:
        NODE_ENV: development
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      # Mount src only — preserves image-built native/index.node (Rust chunk gen)
      - ./backend/src:/usr/src/app/src
      - /usr/src/app/node_modules
      - /usr/src/app/native
    command: npx nodemon --legacy-watch --watch src --ext ts --exec ts-node src/infrastructure/network/server.ts --exitcrash
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongo_user:mongo_password@mongo:27017/minesweeper_infinite?authSource=admin
      - DB_NAME=minesweeper_infinite
      - NODE_OPTIONS=--max-old-space-size=4096
    depends_on:
      - mongo
    networks:
      - minesweeper-net

  frontend:
    build: ./frontend
    command: ["npm", "run", "dev", "--", "--host"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - minesweeper-net

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: mongo_user
      ME_CONFIG_MONGODB_ADMINPASSWORD: mongo_password
      ME_CONFIG_MONGODB_URL: mongodb://mongo_user:mongo_password@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongo
    networks:
      - minesweeper-net
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - minesweeper-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

  mongo:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
      MONGO_INITDB_DATABASE: minesweeper_infinite
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - minesweeper-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - minesweeper-net
    restart: unless-stopped

  cypress:
    build:
      context: .
      dockerfile: Dockerfile.cypress
    profiles: ["test"]
    volumes:
      - ./cypress/screenshots:/e2e/cypress/screenshots
      - ./cypress/videos:/e2e/cypress/videos
    depends_on:
      nginx:
        condition: service_started
    networks:
      - minesweeper-net
    environment:
      - CYPRESS_BASE_URL=http://nginx:80
    command: npx cypress run --browser chrome --headless

  integration-tests:
    build:
      context: .
      dockerfile: Dockerfile.integration-tests
    profiles: ["test", "integration"]
    volumes:
      - ./reports:/app/reports
    networks:
      - minesweeper-net
    environment:
      - TARGET_URL=http://backend:3001
      - RETRY_COUNT=3
      - RETRY_INTERVAL=10
      - TEST_PATTERN=integration-tests/*.spec.js
      - DEBUG=false
    restart: "no"

volumes:
  mongo_data:

networks:
  minesweeper-net:
    driver: bridge
