# Required for cdylib on musl (Alpine Linux) — prevents static linking of libc
# into the shared library so Node.js can dlopen it at runtime.
[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static"]
